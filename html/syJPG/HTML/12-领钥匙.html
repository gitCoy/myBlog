<script type="text/javascript">
    $(".addInput").click(function(){
        $(".getKeyInput").append("<li class='pdY10'><input type='text' placeholder='输入楼盘名称等信息'></li>");
    });

    var msUll = $(".MsgexUl li").length;
    var mslast = $(".MsgexUl li:nth-child(" + msUll + ")").height();
    var msV = $(".Msgex-vertical").height();
    $(".Msgex-vertical").height(msV - mslast + "px");

    $(".rentClic").click(function(){
        $(".maskLayer,.promptBox").css("display","block");
    });
    $(".maskLayer,.cancel").click(function(){
        $(".maskLayer,.promptBox").css("display","none");
    });
</script>
